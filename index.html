<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">
    
    <title>Solar Invest - Calculadora de Desconto</title>
    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #c0c0c0;
            --green-primary: #38b000;
            --green-neon: #aacc00;
            --gold-primary: #fca311;
            --box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            --border-radius: 16px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Bloqueio de Scroll e Altura Dinâmica (Nativo) */
        html, body {
            height: 100%;
            height: 100dvh; 
            overflow: hidden;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
        }

        .page-wrapper {
            width: 100%;
            max-width: 480px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Distribui os elementos ocupando 100% da tela */
            padding: 4vh 5vw;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #1c1c1c 100%);
        }

        /* Header Condensado */
        header {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .logo-text { font-size: 1.5rem; font-weight: 700; }
        .logo-text span { color: var(--green-neon); }
        .hero-title { font-size: 1.2rem; font-weight: 600; color: var(--text-secondary); }

        /* Input Section */
        .calculator-input-section {
            background-color: var(--bg-secondary);
            border-radius: var(--border-radius);
            padding: 3vh 20px;
            box-shadow: var(--box-shadow);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }
        .input-title { font-size: 1rem; margin-bottom: 15px; color: var(--text-primary); }
        
        .input-group {
            position: relative;
            width: 100%;
        }
        input#energy-value {
            width: 100%;
            padding: 15px 15px 15px 50px;
            font-size: 1.5rem;
            font-weight: 700;
            border-radius: 12px;
            background-color: #262626;
            color: var(--green-neon);
            border: 1px solid rgba(170, 204, 0, 0.3);
            text-align: center;
        }
        input#energy-value:focus { outline: none; border-color: var(--green-neon); }
        .calculator-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.4rem;
            color: #666;
        }

        /* Resultados Lado a Lado (Inovação para economizar espaço vertical) */
        .results-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .result-box {
            border-radius: var(--border-radius);
            padding: 15px 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: var(--box-shadow);
        }
        .result-box.green { background-color: rgba(56, 176, 0, 0.1); border: 1px solid rgba(56, 176, 0, 0.3); }
        .result-box.gold { background-color: rgba(252, 163, 17, 0.1); border: 1px solid rgba(252, 163, 17, 0.3); }
        
        .result-label { font-size: 0.7rem; text-transform: uppercase; font-weight: 600; }
        .result-box.green .result-label { color: var(--green-neon); }
        .result-box.gold .result-label { color: var(--gold-primary); }
        
        .result-value { font-size: 1.4rem; font-weight: 700; }
        .result-box.green .result-value { color: var(--green-neon); }
        .result-box.gold .result-value { color: var(--gold-primary); }

        /* Trust Badges - Estilo App */
        .trust-section {
            display: flex;
            justify-content: space-around;
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 10px;
        }
        .trust-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            text-align: center;
        }
        .trust-icon { font-size: 1.2rem; color: var(--green-primary); }
        .trust-title { font-size: 0.75rem; font-weight: 600; }

        /* Bottom Fixed CTA */
        .cta-button {
            width: 100%;
            background: linear-gradient(to right, var(--green-primary), var(--green-neon));
            color: #000;
            border: none;
            padding: 20px;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(56, 176, 0, 0.3);
            margin-bottom: 2vh;
        }

        @font-face {
            font-family: 'FontAwesome';
            src: url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/fonts/fontawesome-webfont.woff2') format('woff2');
        }
        .fa { display: inline-block; font: normal normal normal 14px/1 FontAwesome; font-size: inherit; }
        .fa-sun-o:before { content: "\f185"; }
        .fa-calculator:before { content: "\f1ec"; }
        .fa-shield:before { content: "\f132"; }
        .fa-check-circle-o:before { content: "\f05d"; }
        .fa-bolt:before { content: "\f0e7"; }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <header>
            <div class="logo-container">
                <i class="fa fa-sun-o" style="color: var(--gold-primary); font-size: 1.5rem;"></i>
                <div class="logo-text">SOLAR <span>INVEST</span></div>
            </div>
            <h1 class="hero-title">Menos conta, mais economia!</h1>
        </header>

        <section class="calculator-input-section">
            <h2 class="input-title">Valor da conta atual</h2>
            <div class="input-group">
                <i class="fa fa-calculator calculator-icon"></i>
                <input type="text" id="energy-value" placeholder="R$ 0,00" inputmode="numeric">
            </div>
        </section>

        <section class="results-section">
            <div class="result-box green">
                <span class="result-label">Novo Pagamento</span>
                <div class="result-value" id="final-payment">R$ 0,00</div>
            </div>
            <div class="result-box gold">
                <span class="result-label">Sua Economia</span>
                <div class="result-value" id="discount-amount">R$ 0,00</div>
            </div>
        </section>

        <section class="trust-section">
            <div class="trust-item">
                <i class="fa fa-shield trust-icon"></i>
                <span class="trust-title">100% Seguro</span>
            </div>
            <div class="trust-item">
                <i class="fa fa-check-circle-o trust-icon"></i>
                <span class="trust-title">+1.000 Clientes</span>
            </div>
        </section>

        <button class="cta-button">
            Quero economizar agora
            <i class="fa fa-bolt"></i>
        </button>
    </div>

    <script>
        const formatCurrency = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);

        const getNumericalValue = (inputString) => parseInt(inputString.replace(/\D/g, '') || 0, 10);

        const calculateDiscountPercentage = (valueInReais) => {
            if (valueInReais <= 250) return 0.20;
            if (valueInReais <= 400) return 0.25;
            return 0.30; 
        };

        const inputField = document.getElementById('energy-value');
        const paymentDisplay = document.getElementById('final-payment');
        const discountDisplay = document.getElementById('discount-amount');

        inputField.addEventListener('input', function(e) {
            let valueCentavos = Math.min(getNumericalValue(e.target.value), 9999999);
            const valueReais = valueCentavos / 100;
            e.target.value = formatCurrency(valueReais);
            
            if (valueReais <= 0) {
                paymentDisplay.innerText = formatCurrency(0);
                discountDisplay.innerText = formatCurrency(0);
                return;
            }

            const discountValue = valueReais * calculateDiscountPercentage(valueReais);
            paymentDisplay.innerText = formatCurrency(valueReais - discountValue);
            discountDisplay.innerText = formatCurrency(discountValue);
        });
    </script>
</body>
</html>
